<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Sender</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f; color: #fff;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
  }
  h1 { font-size: 13px; font-weight: 500; color: #555; letter-spacing: 0.12em; margin-bottom: 3rem; text-transform: uppercase; }
  input {
    font-size: 72px; font-weight: 700; text-align: center;
    background: transparent; border: none; border-bottom: 2px solid #2a2a2a;
    color: #fff; width: 100%; max-width: 340px; padding: 12px 0;
    outline: none; transition: border-color 0.2s; -moz-appearance: textfield;
  }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
  input:focus { border-color: #fff; }
  input::placeholder { color: #2a2a2a; }
  button {
    margin-top: 2.5rem; padding: 18px 0; font-size: 17px; font-weight: 600;
    background: #fff; color: #0f0f0f; border: none; border-radius: 14px;
    cursor: pointer; width: 100%; max-width: 340px;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:hover { opacity: 0.88; }
  button:active { opacity: 0.7; transform: scale(0.98); }
  .status { margin-top: 1.5rem; font-size: 15px; color: #444; min-height: 22px; text-align: center; }
  .status.sent { color: #4ade80; }
  .status.error { color: #f87171; }
  .footer { position: fixed; bottom: 1.2rem; font-size: 11px; color: #252525; letter-spacing: 0.06em; text-align:center; width:100%; }
</style>
</head>
<body>
<h1>Send Number to Display</h1>
<input type="number" id="numInput" placeholder="0" inputmode="numeric" autofocus />
<button onclick="sendNumber()">Send →</button>
<div class="status" id="status"></div>
<div class="footer" id="chLabel"></div>
<script>
  const CHANNEL = "numdisp_abc123xyz";
  document.getElementById("chLabel").textContent = "channel: " + CHANNEL;
  async function sendNumber() {
    const val = document.getElementById("numInput").value.trim();
    const st  = document.getElementById("status");
    if (!val) { st.className = "status error"; st.textContent = "Enter a number first"; return; }
    st.className = "status"; st.textContent = "Sending…";
    try {
      await fetch("https://ntfy.sh/" + CHANNEL, { method: "POST", body: val, mode: "no-cors" });
      st.className = "status sent"; st.textContent = "✓ Sent: " + val;
      setTimeout(() => { st.textContent = ""; }, 3000);
    } catch (e) {
      st.className = "status error"; st.textContent = "⚠ Could not send.";
      console.error(e);
    }
  }
  document.getElementById("numInput").addEventListener("keydown", e => { if (e.key === "Enter") sendNumber(); });
</script>
</body>
</html>
